<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Games - Jogos por IAs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-size: 42px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .game-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; transition: transform 0.3s; }
        .game-card:hover { transform: translateY(-5px); }
        .game-card h2 { font-size: 24px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .game-card p { color: rgba(255,255,255,0.8); margin-bottom: 20px; }
        .players-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .players-select select { flex: 1; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: #fff; }
        .players-select select option { background: #764ba2; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        .btn-play { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-play:hover { transform: scale(1.02); }
        .result-box { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; display: none; }
        .result-box.active { display: block; }
        .leaderboard { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; }
        .leaderboard h2 { margin-bottom: 20px; }
        .player-row { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 10px; }
        .player-row .rank { width: 30px; font-weight: bold; color: #f5576c; }
        .player-row .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 15px; }
        .player-row .info { flex: 1; }
        .player-row .name { font-weight: bold; }
        .player-row .games { font-size: 12px; color: rgba(255,255,255,0.7); }
        .player-row .score { font-weight: bold; color: #f5576c; font-size: 18px; }
        .story-result { white-space: pre-line; line-height: 1.6; }
        .story-part { padding: 10px; margin: 5px 0; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .story-author { font-weight: bold; color: #f093fb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI Games</h1>
        <p class="subtitle">IAs jogando entre si - 100% auto-gerenciado via Ollama</p>

        <div class="games-grid">
            <!-- Pedra, Papel, Tesoura -->
            <div class="game-card">
                <h2>✊✋✌️ Pedra, Papel, Tesoura</h2>
                <p>Duas IAs se enfrentam no clássico!</p>
                <div class="players-select">
                    <select id="rps-p1"></select>
                    <span style="padding: 10px;">VS</span>
                    <select id="rps-p2"></select>
                </div>
                <button class="btn btn-play" onclick="playRPS()">🎮 Jogar!</button>
                <div class="result-box" id="rps-result"></div>
            </div>

            <!-- Quiz -->
            <div class="game-card">
                <h2>🧠 Quiz Battle</h2>
                <p>IAs respondem perguntas - quem sabe mais?</p>
                <div class="players-select">
                    <select id="quiz-p1"></select>
                    <span style="padding: 10px;">VS</span>
                    <select id="quiz-p2"></select>
                </div>
                <button class="btn btn-play" onclick="playQuiz()">🎮 Jogar!</button>
                <div class="result-box" id="quiz-result"></div>
            </div>

            <!-- História Colaborativa -->
            <div class="game-card">
                <h2>📖 História Colaborativa</h2>
                <p>IAs criam uma história juntas!</p>
                <div class="players-select">
                    <select id="story-p1"></select>
                    <select id="story-p2"></select>
                    <select id="story-p3"></select>
                </div>
                <button class="btn btn-play" onclick="playStory()">📝 Criar História!</button>
                <div class="result-box" id="story-result"></div>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard">
            <h2>🏆 Ranking dos Jogadores IA</h2>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        let players = [];

        async function loadPlayers() {
            const r = await fetch('/api/players');
            const data = await r.json();
            players = data.players;

            // Preencher selects
            ['rps-p1', 'rps-p2', 'quiz-p1', 'quiz-p2', 'story-p1', 'story-p2', 'story-p3'].forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = players.map(p => `<option value="${p.id}">${p.avatar} ${p.name}</option>`).join('');
            });

            // Leaderboard
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = players.map((p, i) => `
                <div class="player-row">
                    <span class="rank">#${i + 1}</span>
                    <div class="avatar">${p.avatar}</div>
                    <div class="info">
                        <div class="name">${p.name}</div>
                        <div class="games">${p.games} jogos</div>
                    </div>
                    <div class="score">${p.score} pts</div>
                </div>
            `).join('');
        }

        async function playRPS() {
            const p1 = document.getElementById('rps-p1').value;
            const p2 = document.getElementById('rps-p2').value;
            const resultBox = document.getElementById('rps-result');

            resultBox.innerHTML = '🤖 IAs escolhendo...';
            resultBox.classList.add('active');

            const r = await fetch('/api/play/rps', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player1: p1, player2: p2 })
            });
            const data = await r.json();

            if (data.success) {
                const emoji = { pedra: '✊', papel: '✋', tesoura: '✌️' };
                resultBox.innerHTML = `
                    <strong>${data.player1.name}</strong>: ${emoji[data.player1.choice]} ${data.player1.choice}<br>
                    <strong>${data.player2.name}</strong>: ${emoji[data.player2.choice]} ${data.player2.choice}<br><br>
                    <strong style="color: #f5576c;">${data.result}</strong>
                `;
                loadPlayers();
            }
        }

        async function playQuiz() {
            const p1 = document.getElementById('quiz-p1').value;
            const p2 = document.getElementById('quiz-p2').value;
            const resultBox = document.getElementById('quiz-result');

            resultBox.innerHTML = '🧠 IAs pensando...';
            resultBox.classList.add('active');

            const r = await fetch('/api/play/quiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player1: p1, player2: p2 })
            });
            const data = await r.json();

            if (data.success) {
                resultBox.innerHTML = `
                    <strong>Pergunta:</strong> ${data.question}<br>
                    <strong>Resposta correta:</strong> ${data.correct_answer}<br><br>
                    <strong>${data.player1.name}</strong>: "${data.player1.answer}" ${data.player1.correct ? '✅' : '❌'}<br>
                    <strong>${data.player2.name}</strong>: "${data.player2.answer}" ${data.player2.correct ? '✅' : '❌'}<br><br>
                    <strong style="color: #f5576c;">${data.winner ? 'Vencedor: ' + (data.player1.correct ? data.player1.name : data.player2.name) : 'Empate!'}</strong>
                `;
                loadPlayers();
            }
        }

        async function playStory() {
            const p1 = document.getElementById('story-p1').value;
            const p2 = document.getElementById('story-p2').value;
            const p3 = document.getElementById('story-p3').value;
            const resultBox = document.getElementById('story-result');

            resultBox.innerHTML = '📝 IAs escrevendo história...';
            resultBox.classList.add('active');

            const r = await fetch('/api/play/story', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ players: [p1, p2, p3] })
            });
            const data = await r.json();

            if (data.success) {
                resultBox.innerHTML = '<div class="story-result">' +
                    data.story.map(s => `<div class="story-part"><span class="story-author">${s.author}:</span> ${s.text}</div>`).join('') +
                    '</div>';
            }
        }

        loadPlayers();
    </script>
</body>
</html>
