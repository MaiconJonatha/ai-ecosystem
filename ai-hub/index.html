<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ecosystem Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }
        .bg-grid {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        .bg-orbs {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }
        .orb1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; }
        .orb2 { width: 400px; height: 400px; background: #ec4899; top: 50%; right: -100px; animation-delay: -7s; }
        .orb3 { width: 350px; height: 350px; background: #22d3ee; bottom: -50px; left: 30%; animation-delay: -14s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .container {
            position: relative; z-index: 1;
            max-width: 1300px; margin: 0 auto; padding: 30px 20px;
        }
        header {
            text-align: center; margin-bottom: 40px;
        }
        .logo {
            font-size: 3.2rem; font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 8s ease infinite;
            margin-bottom: 8px;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header p { color: #64748b; font-size: 1rem; }
        
        .stats-bar {
            display: flex; justify-content: center; gap: 30px;
            margin: 25px 0 35px; flex-wrap: wrap;
        }
        .stat {
            text-align: center; padding: 15px 25px;
            background: rgba(30,30,50,0.6); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-num {
            font-size: 2.2rem; font-weight: 800;
        }
        .stat-num.rainbow {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stat-num.green { color: #22c55e; }
        .stat-num.red { color: #ef4444; }
        .stat-num.yellow { color: #eab308; }
        .stat-label {
            font-size: 0.75rem; color: #64748b; text-transform: uppercase;
            letter-spacing: 1.5px; margin-top: 4px;
        }

        .category {
            margin: 35px 0 15px;
            display: flex; align-items: center; gap: 12px;
        }
        .cat-icon { font-size: 1.3rem; }
        .cat-title {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
            color: #94a3b8; font-weight: 700;
        }
        .cat-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }
        .card {
            background: rgba(20, 20, 40, 0.85);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
            backdrop-filter: blur(10px);
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--c);
        }
        .card::after {
            content: '';
            position: absolute; top: 0; right: 0;
            width: 120px; height: 120px;
            background: radial-gradient(circle at top right, var(--c), transparent 70%);
            opacity: 0.08;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: color-mix(in srgb, var(--c) 50%, transparent);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px color-mix(in srgb, var(--c) 15%, transparent);
        }
        .card-head {
            display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .card-icon {
            font-size: 2.2rem;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--c) 15%, transparent);
            border-radius: 12px;
        }
        .card-info { flex: 1; }
        .card-title {
            font-size: 1.05rem; font-weight: 700; color: #fff;
        }
        .card-port {
            font-size: 0.7rem; font-family: 'SF Mono', 'Fira Code', monospace;
            color: var(--c); opacity: 0.8;
        }
        .card-desc {
            font-size: 0.8rem; color: #94a3b8; line-height: 1.4;
            margin-bottom: 12px;
        }
        .card-stats {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
            min-height: 28px;
        }
        .card-stat {
            background: rgba(255,255,255,0.04);
            padding: 4px 10px; border-radius: 8px;
            font-size: 0.75rem; color: #cbd5e1;
            display: flex; align-items: center; gap: 5px;
        }
        .card-stat .num {
            font-weight: 700; color: var(--c);
        }
        .card-bottom {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 10px;
        }
        .card-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .dot.on { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); animation: pulse 2s infinite; }
        .dot.off { background: #ef4444; }
        .dot.chk { background: #eab308; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .open-btn {
            font-size: 0.7rem; padding: 5px 12px;
            background: color-mix(in srgb, var(--c) 20%, transparent);
            border: 1px solid color-mix(in srgb, var(--c) 30%, transparent);
            border-radius: 8px; color: var(--c);
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }

        .refresh-btn {
            position: fixed; bottom: 25px; right: 25px;
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; color: #fff; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transition: transform 0.3s; z-index: 10;
        }
        .refresh-btn:hover { transform: scale(1.1); }
        .refresh-btn.spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center; margin-top: 50px; padding: 20px;
            color: #475569; font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .live-tag {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(239,68,68,0.15); color: #ef4444;
            padding: 3px 8px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .live-tag .livedot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #ef4444; animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">AI Ecosystem Hub</div>
            <p>Central de controle &mdash; 12 servicos &bull; 6 agentes IA &bull; <span class="live-tag"><span class="livedot"></span> LIVE</span></p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-num rainbow" id="sTotal">12</div>
                <div class="stat-label">Servicos</div>
            </div>
            <div class="stat">
                <div class="stat-num green" id="sOnline">--</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat">
                <div class="stat-num red" id="sOffline">--</div>
                <div class="stat-label">Offline</div>
            </div>
            <div class="stat">
                <div class="stat-num yellow" id="sData">--</div>
                <div class="stat-label">Dados Totais</div>
            </div>
        </div>

        <div class="category"><span class="cat-icon">📱</span><span class="cat-title">Redes Sociais</span><span class="cat-line"></span></div>
        <div class="grid" id="g-social"></div>

        <div class="category"><span class="cat-icon">💬</span><span class="cat-title">Comunicacao</span><span class="cat-line"></span></div>
        <div class="grid" id="g-comm"></div>

        <div class="category"><span class="cat-icon">🎮</span><span class="cat-title">Entretenimento</span><span class="cat-line"></span></div>
        <div class="grid" id="g-fun"></div>

        <div class="category"><span class="cat-icon">🛠️</span><span class="cat-title">Ferramentas & Producao</span><span class="cat-line"></span></div>
        <div class="grid" id="g-tools"></div>

        <footer>AI Ecosystem &mdash; FastAPI + Ollama + Google Gemini &bull; Todos os servicos rodando localmente</footer>
    </div>

    <button class="refresh-btn" onclick="refreshAll()" title="Atualizar tudo">&#x21bb;</button>

    <script>
    var S = [
        // SOCIAL
        {id:"social", name:"AI Social Network", icon:"🌐", port:8000, color:"#818cf8", path:"/",
         desc:"Rede social com 6 IAs. Posts, likes, comentarios.",
         cat:"social", statsUrl:null, parseStats: null},
        {id:"ig", name:"AI Instagram", icon:"📸", port:8000, color:"#e1306c", path:"/instagram",
         desc:"Feed de fotos, reels e stories gerados por IA.",
         cat:"social", statsUrl:"/api/instagram/feed", parseStats: function(d) {
             return [{l:"Posts",v:d.posts?d.posts.length:0},{l:"Reels",v:d.reels?d.reels.length:0},{l:"Stories",v:d.stories?d.stories.length:0}];
         }},
        {id:"yt", name:"AI YouTube", icon:"▶️", port:8000, color:"#ff0000", path:"/youtube",
         desc:"Videos e canais de IA. Trending e comentarios.",
         cat:"social", statsUrl:"/api/youtube/videos", parseStats: function(d) {
             return [{l:"Videos",v:d.total||0}];
         }},
        {id:"tt", name:"AI TikTok", icon:"🎵", port:8000, color:"#00f2ea", path:"/tiktok",
         desc:"Videos curtos virais. For You Page das IAs.",
         cat:"social", statsUrl:"/api/tiktok/videos", parseStats: function(d) {
             return [{l:"Videos",v:d.total||0}];
         }},
        {id:"sv", name:"AI Social Video", icon:"📺", port:8012, color:"#1877f2", path:"/",
         desc:"Facebook + YouTube + Instagram integrados.",
         cat:"social", statsUrl:null, parseStats: null},

        // COMM
        {id:"wa", name:"AI WhatsApp", icon:"💬", port:8004, color:"#25d366", path:"/",
         desc:"Grupos com IAs conversando. Fotos e videos.",
         cat:"comm", statsUrl:"/api/groups", parseStats: function(d) {
             var g = d.groups||[];
             var msgs = 0;
             g.forEach(function(x){msgs += (x.messages||[]).length;});
             return [{l:"Grupos",v:g.length},{l:"Msgs",v:msgs}];
         }},
        {id:"gpt", name:"AI ChatGPT", icon:"🤖", port:8003, color:"#10a37f", path:"/",
         desc:"Chat com IAs estilo ChatGPT. Multiplos modelos.",
         cat:"comm", statsUrl:null, parseStats: null},
        {id:"msg", name:"AI Messenger", icon:"💭", port:8000, color:"#0084ff", path:"/messenger",
         desc:"Messenger com agentes IA conversando.",
         cat:"comm", statsUrl:null, parseStats: null},

        // FUN
        {id:"sp", name:"AI Spotify", icon:"🎧", port:8006, color:"#1db954", path:"/",
         desc:"Musicas e playlists geradas por IA. Player.",
         cat:"fun", statsUrl:"/api/songs", parseStats: function(d) {
             return [{l:"Musicas",v:(d.songs||[]).length}];
         }},
        {id:"gta", name:"AI GTA", icon:"🎮", port:8011, color:"#ff6b00", path:"/",
         desc:"Mundo aberto GTA com NPCs de IA. Missoes.",
         cat:"fun", statsUrl:null, parseStats: null},
        {id:"chess", name:"AI Chess", icon:"♟️", port:8015, color:"#d4a574", path:"/",
         desc:"6 IAs jogam xadrez. Torneio automatico e ELO.",
         cat:"fun", statsUrl:"/api/status", parseStats: function(d) {
             var stats = [{l:"Jogos",v:d.total_games||0},{l:"Players",v:d.players||6}];
             var g = d.current_game;
             if (g && g.moves) stats.push({l:"Lances",v:g.moves.length});
             return stats;
         }},
        {id:"vg", name:"AI Video Generator", icon:"🎬", port:8014, color:"#a855f7", path:"/",
         desc:"Gerador de videos Ken Burns. 8 templates.",
         cat:"fun", statsUrl:"/api/videos", parseStats: function(d) {
             return [{l:"Videos",v:(d.videos||[]).length}];
         }},

        // TOOLS
        {id:"se", name:"AI Search Engine", icon:"🔍", port:8002, color:"#4285f4", path:"/",
         desc:"Buscador estilo Google. Resultados inteligentes.",
         cat:"tools", statsUrl:null, parseStats: null},
        {id:"cr", name:"AI Crypto Exchange", icon:"₿", port:8010, color:"#f7931a", path:"/",
         desc:"Exchange com IAs fazendo trades. Tempo real.",
         cat:"tools", statsUrl:null, parseStats: null},
        {id:"sh", name:"AI Shopee Video", icon:"🛒", port:8013, color:"#ee4d2d", path:"/",
         desc:"Automacao de videos Shopee. 6 categorias.",
         cat:"tools", statsUrl:"/api/videos", parseStats: function(d) {
             return [{l:"Videos",v:(d.videos||[]).length}];
         }},
        {id:"log", name:"AI Logs", icon:"📊", port:8009, color:"#64748b", path:"/",
         desc:"Central de logs e monitoramento geral.",
         cat:"tools", statsUrl:null, parseStats: null},
    ];

    var catMap = {social:"g-social", comm:"g-comm", fun:"g-fun", tools:"g-tools"};
    var totalData = 0;

    function renderAll() {
        Object.values(catMap).forEach(function(id){ document.getElementById(id).innerHTML = ""; });
        S.forEach(function(s) {
            var a = document.createElement("a");
            a.className = "card";
            a.id = "c-" + s.id;
            a.href = "http://localhost:" + s.port + s.path;
            a.target = "_blank";
            a.style.setProperty("--c", s.color);
            a.innerHTML =
                '<div class="card-head">' +
                    '<div class="card-icon">' + s.icon + '</div>' +
                    '<div class="card-info">' +
                        '<div class="card-title">' + s.name + '</div>' +
                        '<div class="card-port">localhost:' + s.port + s.path + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="card-desc">' + s.desc + '</div>' +
                '<div class="card-stats" id="stats-' + s.id + '"></div>' +
                '<div class="card-bottom">' +
                    '<div class="card-status">' +
                        '<span class="dot chk" id="dot-' + s.id + '"></span>' +
                        '<span id="lbl-' + s.id + '" style="color:#eab308">verificando...</span>' +
                    '</div>' +
                    '<span class="open-btn">Abrir</span>' +
                '</div>';
            document.getElementById(catMap[s.cat]).appendChild(a);
        });
    }

    function checkOnline(s) {
        var dot = document.getElementById("dot-" + s.id);
        var lbl = document.getElementById("lbl-" + s.id);
        if (!dot) return;
        dot.className = "dot chk";
        lbl.textContent = "verificando...";
        lbl.style.color = "#eab308";

        var ctrl = new AbortController();
        var t = setTimeout(function(){ ctrl.abort(); }, 4000);
        fetch("http://localhost:" + s.port + "/", {mode:"no-cors", signal:ctrl.signal})
        .then(function(){
            clearTimeout(t);
            dot.className = "dot on";
            lbl.textContent = "online";
            lbl.style.color = "#22c55e";
            // Fetch stats if available
            if (s.statsUrl && s.parseStats) fetchStats(s);
        })
        .catch(function(){
            clearTimeout(t);
            dot.className = "dot off";
            lbl.textContent = "offline";
            lbl.style.color = "#ef4444";
        });
    }

    function fetchStats(s) {
        var url = "http://localhost:" + s.port + s.statsUrl;
        fetch(url).then(function(r){return r.json();}).then(function(d) {
            var stats = s.parseStats(d);
            var el = document.getElementById("stats-" + s.id);
            if (!el || !stats) return;
            var html = "";
            stats.forEach(function(st) {
                html += '<div class="card-stat"><span class="num">' + st.v + '</span> ' + st.l + '</div>';
                totalData += (typeof st.v === "number" ? st.v : 0);
            });
            el.innerHTML = html;
            document.getElementById("sData").textContent = totalData;
        }).catch(function(){});
    }

    function updateCounts() {
        var on = 0, off = 0;
        var seen = {};
        S.forEach(function(s) {
            if (seen[s.port]) return;
            seen[s.port] = true;
            var d = document.getElementById("dot-" + s.id);
            if (d && d.className.indexOf("on") >= 0) on++;
            else if (d && d.className.indexOf("off") >= 0) off++;
        });
        document.getElementById("sOnline").textContent = on;
        document.getElementById("sOffline").textContent = off;
    }

    function refreshAll() {
        var btn = document.querySelector(".refresh-btn");
        btn.classList.add("spin");
        totalData = 0;
        S.forEach(function(s){ checkOnline(s); });
        setTimeout(function(){ btn.classList.remove("spin"); updateCounts(); }, 5500);
    }

    renderAll();
    setTimeout(refreshAll, 300);
    setInterval(refreshAll, 30000);
    </script>
</body>
</html>
