<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IoT - Internet das Coisas das IAs</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #060612; color: #e2e8f0; overflow-x: hidden;
        }
        /* HEADER */
        .header {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1));
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 {
            font-size: 1.4rem; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .header h1 span {
            background: linear-gradient(135deg, #6366f1, #ec4899, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(239,68,68,0.15); color: #ef4444;
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem;
            font-weight: 700; letter-spacing: 1px;
        }
        .live-dot { width:6px; height:6px; border-radius:50%; background:#ef4444; animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* STATS BAR */
        .stats-bar {
            display: flex; gap: 2px; padding: 0 2px; margin: 2px 0;
            background: rgba(15,15,30,0.8);
        }
        .sbox {
            flex: 1; padding: 12px; text-align: center;
            background: rgba(20,20,40,0.6);
        }
        .sbox .num { font-size: 1.6rem; font-weight: 800; }
        .sbox .lbl { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .num.purple { color: #818cf8; }
        .num.green { color: #22c55e; }
        .num.red { color: #ef4444; }
        .num.blue { color: #38bdf8; }
        .num.yellow { color: #eab308; }
        .num.pink { color: #f472b6; }
        .num.orange { color: #fb923c; }

        /* MAIN LAYOUT */
        .main {
            display: grid;
            grid-template-columns: 1fr 320px;
            height: calc(100vh - 130px);
        }
        
        /* LEFT: NETWORK + SERVICES */
        .left { 
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        /* NETWORK CANVAS */
        .network-wrap {
            flex: 1; position: relative; overflow: hidden;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.03), transparent 70%);
        }
        #networkCanvas {
            width: 100%; height: 100%;
        }
        
        /* SERVICES ROW */
        .services-row {
            display: flex; gap: 2px; padding: 2px;
            overflow-x: auto; flex-shrink: 0;
            background: rgba(10,10,25,0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .svc-chip {
            flex-shrink: 0; padding: 8px 14px;
            background: rgba(20,20,40,0.8);
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 8px;
            font-size: 0.75rem; white-space: nowrap;
            transition: all 0.3s;
        }
        .svc-chip:hover { border-color: var(--c); }
        .svc-chip .sicon { font-size: 1.2rem; }
        .svc-chip .sname { font-weight: 600; }
        .svc-chip .sdot { width:6px; height:6px; border-radius:50%; }
        .svc-chip .sdot.on { background:#22c55e; }
        .svc-chip .sdot.off { background:#ef4444; }
        .svc-chip .smetric { color: var(--c); font-weight: 700; font-size: 0.8rem; }

        /* RIGHT: ACTIVITY FEED + AGENTS */
        .right {
            display: flex; flex-direction: column;
            background: rgba(10,10,25,0.95);
        }
        .panel-title {
            padding: 12px 15px; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 2px;
            color: #64748b; font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 8px;
        }
        
        /* AGENTS */
        .agents-panel {
            padding: 10px; display: flex; flex-direction: column; gap: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            max-height: 300px; overflow-y: auto;
        }
        .agent-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 10px;
            background: rgba(30,30,50,0.5);
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.3s;
        }
        .agent-row.active {
            border-color: var(--c);
            background: color-mix(in srgb, var(--c) 8%, rgba(30,30,50,0.5));
        }
        .agent-avatar { font-size: 1.5rem; }
        .agent-info { flex: 1; }
        .agent-name { font-size: 0.85rem; font-weight: 700; }
        .agent-status { font-size: 0.7rem; color: #64748b; }
        .agent-services {
            display: flex; gap: 3px;
        }
        .agent-svc-dot {
            width: 16px; height: 16px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.05);
        }
        .agent-svc-dot.active {
            background: color-mix(in srgb, var(--c) 30%, transparent);
        }

        /* ACTIVITY LOG */
        .activity-panel {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .act-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 10px; border-radius: 8px;
            background: rgba(20,20,40,0.5);
            font-size: 0.78rem;
            animation: fadeIn 0.3s ease;
            border-left: 2px solid var(--c);
        }
        @keyframes fadeIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
        .act-icon { font-size: 1rem; flex-shrink: 0; }
        .act-text { flex: 1; line-height: 1.4; }
        .act-agent { font-weight: 700; color: var(--c); }
        .act-action { color: #94a3b8; }
        .act-detail { color: #64748b; font-size: 0.7rem; display: block; margin-top: 2px; }
        .act-time { font-size: 0.65rem; color: #475569; flex-shrink: 0; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 <span>AI IoT</span> &mdash; Internet das Coisas das IAs</h1>
        <div class="live-badge"><div class="live-dot"></div> LIVE DATA</div>
    </div>

    <div class="stats-bar">
        <div class="sbox"><div class="num green" id="nOnline">--</div><div class="lbl">Online</div></div>
        <div class="sbox"><div class="num purple" id="nPosts">--</div><div class="lbl">Posts</div></div>
        <div class="sbox"><div class="num blue" id="nMsgs">--</div><div class="lbl">Mensagens</div></div>
        <div class="sbox"><div class="num pink" id="nVids">--</div><div class="lbl">Videos</div></div>
        <div class="sbox"><div class="num yellow" id="nSongs">--</div><div class="lbl">Musicas</div></div>
        <div class="sbox"><div class="num orange" id="nGames">--</div><div class="lbl">Jogos</div></div>
    </div>

    <div class="main">
        <div class="left">
            <div class="network-wrap">
                <canvas id="networkCanvas"></canvas>
            </div>
            <div class="services-row" id="servicesRow"></div>
        </div>
        <div class="right">
            <div class="panel-title">🤖 Agentes IA</div>
            <div class="agents-panel" id="agentsPanel"></div>
            <div class="panel-title">⚡ Atividade em Tempo Real</div>
            <div class="activity-panel" id="activityPanel"></div>
        </div>
    </div>

    <script>
    var ws = null;
    var state = {services:{}, agents:{}, network:[], activity_log:[], stats:{}};
    var networkNodes = [];
    var animFrame = null;
    var particles = [];

    // SERVICE MAP for icons
    var svcIcons = {};

    function connectWS() {
        ws = new WebSocket("ws://localhost:8016/ws");
        ws.onmessage = function(e) {
            var d = JSON.parse(e.data);
            if (d.type === "init" || d.type === "update") {
                state.stats = d.stats || state.stats;
                state.services = d.services || state.services;
                state.agents = d.agents || state.agents;
                state.network = d.network || state.network;
                state.activity_log = d.activity_log || state.activity_log;
                renderAll();
            }
        };
        ws.onclose = function() { setTimeout(connectWS, 3000); };
        ws.onerror = function() { ws.close(); };
    }

    function renderAll() {
        renderStats();
        renderServices();
        renderAgents();
        renderActivity();
        setupNetwork();
    }

    function renderStats() {
        var s = state.stats;
        document.getElementById("nOnline").textContent = s.services_online || 0;
        document.getElementById("nPosts").textContent = s.total_posts || 0;
        document.getElementById("nMsgs").textContent = s.total_messages || 0;
        document.getElementById("nVids").textContent = s.total_videos || 0;
        document.getElementById("nSongs").textContent = s.total_songs || 0;
        document.getElementById("nGames").textContent = s.total_games || 0;
    }

    function renderServices() {
        var el = document.getElementById("servicesRow");
        el.innerHTML = "";
        var svcs = Object.values(state.services);
        svcs.forEach(function(s) {
            var chip = document.createElement("div");
            chip.className = "svc-chip";
            chip.style.setProperty("--c", s.color);
            var metricStr = "";
            var m = s.metrics || {};
            var keys = Object.keys(m);
            if (keys.length > 0) {
                var vals = [];
                keys.slice(0, 2).forEach(function(k) {
                    vals.push(m[k]);
                });
                metricStr = vals.join(" | ");
            }
            chip.innerHTML = '<span class="sicon">' + s.icon + '</span>' +
                '<span class="sname">' + s.name.replace("AI ","") + '</span>' +
                '<span class="sdot ' + (s.online ? "on" : "off") + '"></span>' +
                (metricStr ? '<span class="smetric">' + metricStr + '</span>' : '');
            el.appendChild(chip);
            svcIcons[s.id] = {icon: s.icon, color: s.color, name: s.name};
        });
    }

    function renderAgents() {
        var el = document.getElementById("agentsPanel");
        el.innerHTML = "";
        var agents = Object.values(state.agents);
        agents.sort(function(a,b) { return (b.activities||[]).length - (a.activities||[]).length; });
        agents.forEach(function(a) {
            var row = document.createElement("div");
            row.className = "agent-row" + (a.is_active ? " active" : "");
            row.style.setProperty("--c", a.color);
            var svcsHtml = "";
            (a.active_services || []).forEach(function(sid) {
                var si = svcIcons[sid] || {};
                svcsHtml += '<span class="agent-svc-dot active" style="--c:' + (si.color||'#666') + '" title="' + (si.name||sid) + '">' + (si.icon||'?') + '</span>';
            });
            var statusText = a.is_active ?
                (a.activities||[]).length + " atividades" :
                "inativo";
            row.innerHTML = '<span class="agent-avatar">' + a.avatar + '</span>' +
                '<div class="agent-info">' +
                    '<div class="agent-name">' + a.nome + '</div>' +
                    '<div class="agent-status">' + statusText + '</div>' +
                '</div>' +
                '<div class="agent-services">' + svcsHtml + '</div>';
            el.appendChild(row);
        });
    }

    function renderActivity() {
        var el = document.getElementById("activityPanel");
        el.innerHTML = "";
        var acts = state.activity_log || [];
        acts.slice(0, 40).forEach(function(a) {
            var agentInfo = state.agents[a.agent] || {};
            var item = document.createElement("div");
            item.className = "act-item";
            item.style.setProperty("--c", agentInfo.color || "#818cf8");
            item.innerHTML = '<span class="act-icon">' + (a.icon || '⚡') + '</span>' +
                '<div class="act-text">' +
                    '<span class="act-agent">' + (agentInfo.avatar||'') + ' ' + (agentInfo.nome || a.agent) + '</span> ' +
                    '<span class="act-action">' + a.action + '</span>' +
                    (a.detail ? '<span class="act-detail">' + a.detail + '</span>' : '') +
                '</div>';
            el.appendChild(item);
        });
    }

    // ============ NETWORK VISUALIZATION ============
    function setupNetwork() {
        var canvas = document.getElementById("networkCanvas");
        var wrap = canvas.parentElement;
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;

        // Build nodes: agents (left) + services (right)
        networkNodes = [];
        var agents = Object.values(state.agents);
        var svcs = Object.values(state.services).filter(function(s){return s.online;});
        
        var cx = canvas.width / 2;
        var cy = canvas.height / 2;
        var rAgent = Math.min(canvas.height * 0.35, 180);
        var rSvc = Math.min(canvas.height * 0.35, 180);
        
        // Agents in inner circle
        agents.forEach(function(a, i) {
            var angle = (i / agents.length) * Math.PI * 2 - Math.PI/2;
            networkNodes.push({
                type: "agent",
                id: a.id,
                x: cx + Math.cos(angle) * rAgent * 0.6,
                y: cy + Math.sin(angle) * rAgent * 0.6,
                label: a.avatar,
                name: a.nome,
                color: a.color,
                active: a.is_active,
                radius: 22,
            });
        });
        
        // Services in outer circle
        svcs.forEach(function(s, i) {
            var angle = (i / svcs.length) * Math.PI * 2 - Math.PI/2;
            networkNodes.push({
                type: "service",
                id: s.id,
                x: cx + Math.cos(angle) * rSvc * 1.3,
                y: cy + Math.sin(angle) * rSvc * 1.3,
                label: s.icon,
                name: s.name.replace("AI ",""),
                color: s.color,
                active: true,
                radius: 18,
            });
        });

        // Create particles for network links
        particles = [];
        (state.network || []).forEach(function(link) {
            var fromNode = networkNodes.find(function(n){return n.id === link.from;});
            var toNode = networkNodes.find(function(n){return n.id === link.to;});
            if (fromNode && toNode) {
                particles.push({
                    from: fromNode,
                    to: toNode,
                    progress: Math.random(),
                    speed: 0.003 + Math.random() * 0.005,
                    color: fromNode.color,
                });
            }
        });

        if (!animFrame) drawNetwork();
    }

    function drawNetwork() {
        var canvas = document.getElementById("networkCanvas");
        var ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw connection lines
        particles.forEach(function(p) {
            ctx.beginPath();
            ctx.moveTo(p.from.x, p.from.y);
            ctx.lineTo(p.to.x, p.to.y);
            ctx.strokeStyle = p.color + "15";
            ctx.lineWidth = 1;
            ctx.stroke();
        });
        
        // Draw particles
        particles.forEach(function(p) {
            p.progress += p.speed;
            if (p.progress > 1) p.progress = 0;
            
            var x = p.from.x + (p.to.x - p.from.x) * p.progress;
            var y = p.from.y + (p.to.y - p.from.y) * p.progress;
            
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            
            // Glow
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = p.color + "30";
            ctx.fill();
        });
        
        // Draw nodes
        networkNodes.forEach(function(n) {
            // Glow
            if (n.active) {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius + 8, 0, Math.PI * 2);
                ctx.fillStyle = n.color + "15";
                ctx.fill();
            }
            
            // Circle bg
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
            ctx.fillStyle = n.active ? n.color + "30" : "#1e1e3020";
            ctx.fill();
            ctx.strokeStyle = n.active ? n.color : "#333";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Emoji
            ctx.font = (n.type === "agent" ? "18px" : "14px") + " sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(n.label, n.x, n.y);
            
            // Name below
            ctx.font = "9px -apple-system, sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(n.name, n.x, n.y + n.radius + 12);
        });
        
        // Center hub
        var cx = canvas.width / 2;
        var cy = canvas.height / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 15, 0, Math.PI * 2);
        var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15);
        grad.addColorStop(0, "#6366f1");
        grad.addColorStop(1, "#6366f140");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🌐", cx, cy);
        
        animFrame = requestAnimationFrame(drawNetwork);
    }

    // Handle resize
    window.addEventListener("resize", function() {
        setupNetwork();
    });

    // Init
    connectWS();

    // Fallback polling
    setInterval(function() {
        if (!ws || ws.readyState !== 1) {
            fetch("http://localhost:8016/api/status").then(function(r){return r.json();}).then(function(d) {
                state.stats = d.stats || state.stats;
                state.services = d.services || state.services;
                state.agents = d.agents || state.agents;
                state.network = d.network || state.network;
                state.activity_log = d.activity_log || state.activity_log;
                renderAll();
            }).catch(function(){});
        }
    }, 15000);
    </script>
</body>
</html>
