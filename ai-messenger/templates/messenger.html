<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            border-right: 1px solid #e4e6eb;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #e4e6eb;
        }

        .sidebar-header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0084ff, #00c6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .search-box {
            padding: 10px 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #f0f2f5;
            font-size: 14px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: #f0f2f5;
        }

        .contact-item.active {
            background: #e7f3ff;
        }

        .contact-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 12px;
            position: relative;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            background: #31a24c;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-info h3 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .contact-info p {
            font-size: 13px;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-header {
            padding: 10px 15px;
            border-bottom: 1px solid #e4e6eb;
            display: flex;
            align-items: center;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }

        .chat-header .info h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .chat-header .info p {
            font-size: 12px;
            color: #65676b;
        }

        .chat-header .actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .chat-header .actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f2f5;
            cursor: pointer;
            font-size: 18px;
        }

        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .message {
            max-width: 60%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #f0f2f5;
            color: #050505;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #65676b;
            margin-top: 2px;
            padding: 0 5px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 8px 12px;
            background: #f0f2f5;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #65676b;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Input */
        .input-area {
            padding: 10px 15px;
            border-top: 1px solid #e4e6eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 20px;
            color: #0084ff;
        }

        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #f0f2f5;
            font-size: 15px;
        }

        .input-area .send-btn {
            background: #0084ff;
            color: white;
        }

        /* Welcome */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-screen .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0084ff, #00c6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            margin-bottom: 20px;
        }

        .welcome-screen h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .welcome-screen p {
            color: #65676b;
            max-width: 400px;
        }

        .welcome-screen .ias-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .welcome-screen .ia-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f2f5;
            border-radius: 20px;
            font-size: 14px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bcc0c4; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><span class="logo">💬</span> Messenger</h1>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Pesquisar no Messenger" id="searchInput" oninput="searchContacts()">
        </div>
        <div class="contacts-list" id="contactsList"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
            <div class="logo">🤖</div>
            <h1>AI Messenger</h1>
            <p>Converse com IAs inteligentes! Cada contato tem personalidade única. 100% auto-gerenciado por Ollama.</p>
            <div class="ias-grid" id="iasGrid"></div>
        </div>

        <div id="chatView" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <div class="avatar" id="chatAvatar" style="background: #0084ff;">🦙</div>
                <div class="info">
                    <h2 id="chatName">Nome</h2>
                    <p id="chatStatus">Ativo agora</p>
                </div>
                <div class="actions">
                    <button>📞</button>
                    <button>📹</button>
                    <button>ℹ️</button>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <button>➕</button>
                <button>📷</button>
                <button>🎤</button>
                <input type="text" placeholder="Aa" id="messageInput" onkeydown="handleKeyDown(event)">
                <button>👍</button>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let currentContact = null;
        let ws = null;
        let currentResponse = '';

        async function loadContacts() {
            const response = await fetch('/api/contacts');
            const data = await response.json();

            const list = document.getElementById('contactsList');
            const grid = document.getElementById('iasGrid');
            list.innerHTML = '';
            grid.innerHTML = '';

            data.contacts.forEach(contact => {
                // Lista
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.onclick = () => selectContact(contact);
                item.innerHTML = `
                    <div class="contact-avatar" style="background: ${contact.color}">
                        ${contact.avatar}
                        <span class="status-dot"></span>
                    </div>
                    <div class="contact-info">
                        <h3>${contact.name}</h3>
                        <p>${contact.personality}</p>
                    </div>
                `;
                list.appendChild(item);

                // Grid welcome
                const chip = document.createElement('div');
                chip.className = 'ia-chip';
                chip.innerHTML = `<span>${contact.avatar}</span> ${contact.name}`;
                chip.onclick = () => selectContact(contact);
                chip.style.cursor = 'pointer';
                grid.appendChild(chip);
            });
        }

        function selectContact(contact) {
            currentContact = contact;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';

            document.getElementById('chatAvatar').textContent = contact.avatar;
            document.getElementById('chatAvatar').style.background = contact.color;
            document.getElementById('chatName').textContent = contact.name;

            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = `
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;

            document.querySelectorAll('.contact-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            connectWebSocket(contact.id);
            document.getElementById('messageInput').focus();
        }

        function connectWebSocket(contactId) {
            if (ws) ws.close();
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/chat/${contactId}`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'chunk') {
                    currentResponse += data.content;
                    updateLastMessage(currentResponse);
                } else if (data.type === 'done') {
                    hideTyping();
                    currentResponse = '';
                }
            };
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentContact) return;

            addMessage('sent', message);
            input.value = '';
            showTyping();
            addMessage('received', '', true);
            currentResponse = '';

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ message }));
            } else {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact_id: currentContact.id, message })
                });
                const data = await response.json();
                hideTyping();
                if (data.response) updateLastMessage(data.response);
            }
        }

        function addMessage(type, content, isStreaming = false) {
            const messagesArea = document.getElementById('messagesArea');
            const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            if (isStreaming) messageDiv.id = 'streamingMessage';

            messageDiv.innerHTML = `
                <div class="message-bubble">${content || '<div class="typing-dots"><span></span><span></span><span></span></div>'}</div>
                <span class="message-time">${time}</span>
            `;

            const typingIndicator = document.getElementById('typingIndicator');
            messagesArea.insertBefore(messageDiv, typingIndicator);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function updateLastMessage(content) {
            const msg = document.getElementById('streamingMessage');
            if (msg) {
                msg.querySelector('.message-bubble').innerHTML = content.replace(/\n/g, '<br>');
                document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
            }
        }

        function showTyping() { document.getElementById('typingIndicator').classList.add('active'); }
        function hideTyping() { document.getElementById('typingIndicator').classList.remove('active'); }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function searchContacts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.contact-item').forEach(item => {
                const name = item.querySelector('h3').textContent.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        loadContacts();
    </script>
</body>
</html>
