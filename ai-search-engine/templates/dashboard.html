<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Search Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f0f;
            color: #e8eaed;
            min-height: 100vh;
        }

        .header {
            background: #1a1a1a;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #303030;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span:nth-child(1) { color: #4285f4; }
        .logo span:nth-child(2) { color: #ea4335; }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #9aa0a6;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: #303030;
            color: #e8eaed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        .page-title {
            font-size: 28px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #303030;
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4285f4, #34a853);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-label {
            font-size: 14px;
            color: #9aa0a6;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 600;
            color: #8ab4f8;
        }

        .stat-change {
            font-size: 13px;
            color: #34a853;
            margin-top: 5px;
        }

        /* Agents Section */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #303030;
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .agent-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4285f4, #34a853);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .agent-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .agent-specialty {
            font-size: 13px;
            color: #9aa0a6;
            text-transform: uppercase;
        }

        .agent-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #34a853;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34a853;
            border-radius: 50%;
        }

        .agent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #303030;
        }

        .agent-stat {
            text-align: center;
        }

        .agent-stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #8ab4f8;
        }

        .agent-stat-label {
            font-size: 11px;
            color: #9aa0a6;
            margin-top: 2px;
        }

        /* Activity Log */
        .activity-log {
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #303030;
        }

        .activity-header {
            padding: 20px;
            border-bottom: 1px solid #303030;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid #252525;
        }

        .activity-item:hover {
            background: #252525;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            background: #303030;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .activity-content {
            flex: 1;
        }

        .activity-text {
            font-size: 14px;
        }

        .activity-time {
            font-size: 12px;
            color: #9aa0a6;
            margin-top: 2px;
        }

        /* Charts placeholder */
        .chart-container {
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #303030;
            padding: 20px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9aa0a6;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span></span>
            <span>AI Search</span>
            Dashboard
        </div>
        <nav class="nav-links">
            <a href="/">Buscar</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/api/stats">API Stats</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">
            <span></span>
            Dashboard de Gerenciamento por IAs
        </h1>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-header">
                    <div class="stat-icon"></div>
                    <span class="stat-label">IAs Ativas</span>
                </div>
                <div class="stat-value" id="stat-agents">0</div>
                <div class="stat-change">+0% hoje</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <div class="stat-icon"></div>
                    <span class="stat-label">Paginas Indexadas</span>
                </div>
                <div class="stat-value" id="stat-pages">0</div>
                <div class="stat-change">+0 novas</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <div class="stat-icon"></div>
                    <span class="stat-label">Buscas Hoje</span>
                </div>
                <div class="stat-value" id="stat-queries">0</div>
                <div class="stat-change">+0% vs ontem</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <div class="stat-icon"></div>
                    <span class="stat-label">Tempo Medio</span>
                </div>
                <div class="stat-value">0.2s</div>
                <div class="stat-change">-5% mais rapido</div>
            </div>
        </div>

        <!-- Agents Section -->
        <section class="section">
            <h2 class="section-title">
                <span></span>
                Agentes de IA Gerenciando o Sistema
            </h2>
            <div class="agents-grid" id="agents-grid">
                <!-- Agents carregados via JS -->
            </div>
        </section>

        <!-- Activity Log -->
        <section class="section">
            <div class="activity-log">
                <div class="activity-header">
                    <h3> Atividade em Tempo Real</h3>
                    <span style="color: #9aa0a6; font-size: 13px;">Auto-atualiza a cada 5s</span>
                </div>
                <div class="activity-list" id="activity-list">
                    <!-- Atividades carregadas via JS -->
                </div>
            </div>
        </section>
    </main>

    <script>
        // Agentes de IA do sistema
        const agents = [
            {
                name: "Crawler AI",
                avatar: "",
                specialty: "CRAWLER",
                model: "llama3.2:3b",
                description: "Rastrea e descobre novas paginas na web",
                tasks: 1250,
                pages: 8500,
                accuracy: 98.5
            },
            {
                name: "Indexer AI",
                avatar: "",
                specialty: "INDEXER",
                model: "gemma2:2b",
                description: "Indexa e organiza o conteudo encontrado",
                tasks: 980,
                pages: 7200,
                accuracy: 99.1
            },
            {
                name: "Ranker AI",
                avatar: "",
                specialty: "RANKER",
                model: "phi3:mini",
                description: "Rankeia resultados por relevancia",
                tasks: 2100,
                pages: 15000,
                accuracy: 97.8
            },
            {
                name: "Analyzer AI",
                avatar: "",
                specialty: "ANALYZER",
                model: "qwen2:1.5b",
                description: "Analisa qualidade e confiabilidade",
                tasks: 750,
                pages: 5600,
                accuracy: 96.3
            },
            {
                name: "Summarizer AI",
                avatar: "",
                specialty: "SUMMARIZER",
                model: "tinyllama",
                description: "Cria resumos e snippets",
                tasks: 1800,
                pages: 12000,
                accuracy: 95.7
            },
            {
                name: "Optimizer AI",
                avatar: "",
                specialty: "OPTIMIZER",
                model: "llama3.2:3b",
                description: "Otimiza queries e performance",
                tasks: 500,
                pages: 3200,
                accuracy: 99.5
            }
        ];

        // Renderizar agentes
        function renderAgents() {
            const grid = document.getElementById('agents-grid');
            grid.innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.avatar}</div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="agent-specialty">${agent.specialty} - ${agent.model}</div>
                        </div>
                        <div class="agent-status">
                            <span class="status-dot"></span>
                            Ativo
                        </div>
                    </div>
                    <p style="font-size: 13px; color: #9aa0a6;">${agent.description}</p>
                    <div class="agent-stats">
                        <div class="agent-stat">
                            <div class="agent-stat-value">${formatNumber(agent.tasks)}</div>
                            <div class="agent-stat-label">Tarefas</div>
                        </div>
                        <div class="agent-stat">
                            <div class="agent-stat-value">${formatNumber(agent.pages)}</div>
                            <div class="agent-stat-label">Paginas</div>
                        </div>
                        <div class="agent-stat">
                            <div class="agent-stat-value">${agent.accuracy}%</div>
                            <div class="agent-stat-label">Precisao</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Atividades simuladas
        const activities = [
            { icon: '', text: 'Crawler AI encontrou 15 novas paginas', time: '2s atras' },
            { icon: '', text: 'Indexer AI processou lote de 50 documentos', time: '15s atras' },
            { icon: '', text: 'Ranker AI atualizou ranking para "machine learning"', time: '32s atras' },
            { icon: '', text: 'Analyzer AI verificou 10 fontes', time: '1m atras' },
            { icon: '', text: 'Summarizer AI criou 25 snippets', time: '2m atras' },
            { icon: '', text: 'Optimizer AI otimizou 100 queries', time: '3m atras' },
            { icon: '', text: 'Sistema auto-aperfeicoamento executado', time: '5m atras' },
            { icon: '', text: 'Crawler AI iniciou novo ciclo de rastreamento', time: '7m atras' },
            { icon: '', text: 'Backup automatico do indice concluido', time: '10m atras' },
        ];

        function renderActivities() {
            const list = document.getElementById('activity-list');
            list.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon">${activity.icon}</div>
                    <div class="activity-content">
                        <div class="activity-text">${activity.text}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function formatNumber(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Carregar stats
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                document.getElementById('stat-agents').textContent = agents.length;
                document.getElementById('stat-pages').textContent = formatNumber(stats.pages_indexed || 0);
                document.getElementById('stat-queries').textContent = formatNumber(stats.queries_processed || 0);
            } catch (error) {
                console.error('Erro ao carregar stats:', error);
            }
        }

        // Inicializar
        renderAgents();
        renderActivities();
        loadStats();

        // Atualizar a cada 5 segundos
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
