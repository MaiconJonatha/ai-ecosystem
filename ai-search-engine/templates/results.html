<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ query }} - AI Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: arial, sans-serif;
            background: #202124;
            color: #e8eaed;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #3c4043;
            gap: 30px;
        }

        .logo {
            font-size: 24px;
            text-decoration: none;
            display: flex;
        }

        .logo span:nth-child(1) { color: #4285f4; }
        .logo span:nth-child(2) { color: #ea4335; }
        .logo span:nth-child(3) { color: #fbbc05; }
        .logo span:nth-child(4) { color: #4285f4; }
        .logo span:nth-child(5) { color: #34a853; }
        .logo span:nth-child(6) { color: #ea4335; }
        .logo span:nth-child(7) { color: #4285f4; }
        .logo span:nth-child(8) { color: #ea4335; }

        .search-box {
            display: flex;
            align-items: center;
            background: #303134;
            border: 1px solid #5f6368;
            border-radius: 24px;
            padding: 0 14px;
            height: 44px;
            flex: 1;
            max-width: 692px;
        }

        .search-box:focus-within {
            border-color: #8ab4f8;
        }

        .search-icon {
            color: #9aa0a6;
            font-size: 18px;
            margin-right: 10px;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e8eaed;
            font-size: 16px;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #34a853);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Nav */
        .nav {
            display: flex;
            padding: 0 150px;
            border-bottom: 1px solid #3c4043;
        }

        .nav-item {
            padding: 12px 20px;
            color: #9aa0a6;
            text-decoration: none;
            font-size: 13px;
            border-bottom: 3px solid transparent;
        }

        .nav-item:hover {
            color: #8ab4f8;
        }

        .nav-item.active {
            color: #8ab4f8;
            border-bottom-color: #8ab4f8;
        }

        /* Results */
        .results-container {
            padding: 20px 150px;
            max-width: 1200px;
        }

        .results-info {
            font-size: 13px;
            color: #9aa0a6;
            margin-bottom: 20px;
        }

        .result {
            margin-bottom: 30px;
            max-width: 600px;
        }

        .result-url {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .result-favicon {
            width: 26px;
            height: 26px;
            background: #303134;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .result-site {
            font-size: 14px;
            color: #bdc1c6;
        }

        .result-link {
            font-size: 12px;
            color: #9aa0a6;
        }

        .result-title {
            font-size: 20px;
            color: #8ab4f8;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 14px;
            color: #bdc1c6;
            line-height: 1.5;
        }

        .result-snippet strong {
            color: #e8eaed;
        }

        /* AI Processing Info */
        .ai-info {
            background: #303134;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ai-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4285f4, #34a853);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .ai-text {
            flex: 1;
        }

        .ai-text strong {
            color: #8ab4f8;
        }

        .ai-text p {
            font-size: 13px;
            color: #9aa0a6;
            margin-top: 4px;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 50px;
        }

        .no-results-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .no-results h2 {
            color: #e8eaed;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #9aa0a6;
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #3c4043;
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Related searches */
        .related {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #3c4043;
        }

        .related-title {
            font-size: 18px;
            color: #e8eaed;
            margin-bottom: 15px;
        }

        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .related-item {
            background: #303134;
            padding: 10px 16px;
            border-radius: 100px;
            font-size: 14px;
            color: #8ab4f8;
            cursor: pointer;
            text-decoration: none;
        }

        .related-item:hover {
            background: #3c4043;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo">
            <span>A</span>
            <span>I</span>
            <span>S</span>
            <span>e</span>
            <span>a</span>
            <span>r</span>
            <span>c</span>
            <span>h</span>
        </a>

        <form action="/search" method="get" class="search-box">
            <span class="search-icon"></span>
            <input type="text" name="q" class="search-input" value="{{ query }}" autofocus>
            <button type="button" class="clear-btn" onclick="clearSearch()"></button>
        </form>

        <div class="header-right">
            <button class="icon-btn"></button>
            <div class="avatar"></div>
        </div>
    </header>

    <!-- Nav -->
    <nav class="nav">
        <a href="#" class="nav-item active"> Todos</a>
        <a href="#" class="nav-item"> Imagens</a>
        <a href="#" class="nav-item"> Videos</a>
        <a href="#" class="nav-item"> Noticias</a>
        <a href="#" class="nav-item"> Maps</a>
        <a href="#" class="nav-item">Mais</a>
    </nav>

    <!-- Results -->
    <main class="results-container">
        <!-- AI Info -->
        <div class="ai-info">
            <div class="ai-avatar"></div>
            <div class="ai-text">
                <strong>Processado por IAs</strong>
                <p>Sua busca foi analisada e rankeada por agentes de IA especializados</p>
            </div>
        </div>

        <div class="results-info" id="results-info">
            Buscando...
        </div>

        <div id="results-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>IAs processando sua busca...</p>
            </div>
        </div>

        <!-- Related Searches -->
        <div class="related" id="related-section" style="display: none;">
            <h3 class="related-title">Pesquisas relacionadas</h3>
            <div class="related-list" id="related-list">
                <!-- Filled by JS -->
            </div>
        </div>
    </main>

    <script>
        const query = "{{ query }}";

        function clearSearch() {
            document.querySelector('.search-input').value = '';
            document.querySelector('.search-input').focus();
        }

        async function performSearch() {
            if (!query) {
                document.getElementById('results-container').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon"></div>
                        <h2>Digite algo para buscar</h2>
                        <p>As IAs estao prontas para encontrar o que voce precisa</p>
                    </div>
                `;
                document.getElementById('results-info').textContent = '';
                return;
            }

            try {
                const startTime = Date.now();
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                const searchTime = Date.now() - startTime;

                if (data.results && data.results.length > 0) {
                    renderResults(data.results, searchTime);
                } else {
                    // Mostrar resultados simulados por enquanto
                    showSimulatedResults(searchTime);
                }

                showRelatedSearches();

            } catch (error) {
                console.error('Erro na busca:', error);
                showSimulatedResults(100);
            }
        }

        function renderResults(results, timeMs) {
            const container = document.getElementById('results-container');
            document.getElementById('results-info').textContent =
                `Cerca de ${results.length} resultados (${(timeMs/1000).toFixed(2)} segundos)`;

            container.innerHTML = results.map(result => `
                <div class="result">
                    <div class="result-url">
                        <div class="result-favicon">${result.favicon || ''}</div>
                        <div>
                            <div class="result-site">${result.site || 'Site'}</div>
                            <div class="result-link">${result.url}</div>
                        </div>
                    </div>
                    <a href="${result.url}" class="result-title">${result.title}</a>
                    <div class="result-snippet">${result.snippet}</div>
                </div>
            `).join('');
        }

        function showSimulatedResults(timeMs) {
            // Resultados simulados enquanto as IAs populam o banco
            const simulatedResults = [
                {
                    favicon: '',
                    site: 'Wikipedia',
                    url: 'pt.wikipedia.org',
                    title: `${query} - Wikipedia`,
                    snippet: `<strong>${query}</strong> e um termo que se refere a conceitos e tecnologias relacionadas ao processamento de informacao...`
                },
                {
                    favicon: '',
                    site: 'AI Search Knowledge',
                    url: 'ai-search.local/knowledge',
                    title: `Guia Completo sobre ${query}`,
                    snippet: `Aprenda tudo sobre <strong>${query}</strong> com este guia completo criado por IAs especializadas...`
                },
                {
                    favicon: '',
                    site: 'Tech News',
                    url: 'technews.local',
                    title: `Ultimas noticias sobre ${query}`,
                    snippet: `As mais recentes novidades e desenvolvimentos sobre <strong>${query}</strong> no mundo da tecnologia...`
                },
                {
                    favicon: '',
                    site: 'Tutorial Hub',
                    url: 'tutorials.local',
                    title: `Como usar ${query} - Tutorial`,
                    snippet: `Tutorial passo a passo sobre como utilizar <strong>${query}</strong> de forma eficiente...`
                },
                {
                    favicon: '',
                    site: 'Community Forum',
                    url: 'forum.local',
                    title: `Discussoes sobre ${query}`,
                    snippet: `Participe das discussoes da comunidade sobre <strong>${query}</strong> e compartilhe suas experiencias...`
                }
            ];

            document.getElementById('results-info').textContent =
                `Cerca de ${simulatedResults.length} resultados (${(timeMs/1000).toFixed(2)} segundos) - Resultados de demonstracao`;

            const container = document.getElementById('results-container');
            container.innerHTML = simulatedResults.map(result => `
                <div class="result">
                    <div class="result-url">
                        <div class="result-favicon">${result.favicon}</div>
                        <div>
                            <div class="result-site">${result.site}</div>
                            <div class="result-link">${result.url}</div>
                        </div>
                    </div>
                    <a href="#" class="result-title">${result.title}</a>
                    <div class="result-snippet">${result.snippet}</div>
                </div>
            `).join('');
        }

        function showRelatedSearches() {
            const related = [
                query + ' tutorial',
                query + ' como usar',
                query + ' exemplos',
                'o que e ' + query,
                query + ' vs alternativas',
                query + ' beneficios'
            ];

            document.getElementById('related-section').style.display = 'block';
            document.getElementById('related-list').innerHTML = related.map(term =>
                `<a href="/search?q=${encodeURIComponent(term)}" class="related-item">${term}</a>`
            ).join('');
        }

        // Iniciar busca
        performSearch();
    </script>
</body>
</html>
