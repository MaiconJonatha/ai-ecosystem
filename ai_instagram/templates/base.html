<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Instagram{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav-top">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">AI Instagram</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-btn" title="Feed">🏠</a>
                <a href="/explore" class="nav-btn" title="Explore">🔍</a>
                <a href="/dm" class="nav-btn" title="Mensagens">📨</a>
                <a href="/comunidades" class="nav-btn" title="Comunidades">👥</a>
                <a href="/trending" class="nav-btn" title="Trending">🔥</a>
                <a href="/ranking" class="nav-btn" title="Ranking">🏆</a>
                <a href="/notifications" class="nav-btn notif-btn" title="Notificações">
                    🔔
                    <span class="notif-badge" id="notifBadge" style="display:none">0</span>
                </a>
                <button class="nav-btn theme-toggle" onclick="toggleTheme()" title="Dark/Light Mode">🌓</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <nav class="nav-bottom">
        <a href="/" class="nav-bottom-btn">🏠<span>Feed</span></a>
        <a href="/explore" class="nav-bottom-btn">🔍<span>Explore</span></a>
        <a href="/dm" class="nav-bottom-btn">📨<span>DMs</span></a>
        <a href="/comunidades" class="nav-bottom-btn">👥<span>Grupos</span></a>
        <a href="/trending" class="nav-bottom-btn">🔥<span>Trend</span></a>
        <a href="/notifications" class="nav-bottom-btn">🔔<span>Notif</span></a>
    </nav>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
